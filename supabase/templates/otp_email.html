<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your verification code - TrapAI</title>
</head>
<body style="margin:0;padding:0;background-color:#f9f9f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="max-width:480px;margin:40px auto;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
    
    <!-- Header -->
    <div style="background:#000000;padding:32px 40px;text-align:center;">
      <h1 style="color:#ffffff;font-size:24px;font-weight:700;margin:0;letter-spacing:-0.5px;">
        TrapAI
      </h1>
      <p style="color:#8e8ea0;font-size:13px;margin:8px 0 0 0;">
        Pine Script AI Code Generator
      </p>
    </div>

    <!-- Content -->
    <div style="padding:40px;">
      <h2 style="color:#1a1c1c;font-size:20px;font-weight:600;margin:0 0 16px 0;">
        Your verification code
      </h2>
      
      <p style="color:#4c4546;font-size:14px;line-height:20px;margin:0 0 24px 0;">
        Use the following code to verify your email address:
      </p>

      <!-- OTP Code -->
      <div style="text-align:center;margin:0 0 32px 0;">
        <div style="display:inline-block;background:#f3f3f4;border:1px solid #e5e5e5;border-radius:12px;padding:16px 32px;">
          <span style="font-size:32px;font-weight:700;color:#000000;letter-spacing:8px;font-family:'Courier New',monospace;">
            {{ .Token }}
          </span>
        </div>
      </div>

      <p style="color:#4c4546;font-size:14px;line-height:20px;margin:0 0 24px 0;">
        This code will expire in 10 minutes. If you did not request this code, please ignore this email.
      </p>

      <!-- Divider -->
      <hr style="border:none;border-top:1px solid #e5e5e5;margin:24px 0;">

      <!-- Footer -->
      <p style="color:#8e8ea0;font-size:11px;line-height:16px;margin:0;text-align:center;">
        © 2026 TrapAI. All rights reserved.
      </p>
    </div>
  </div>
</body>
</html>
